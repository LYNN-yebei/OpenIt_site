
<canvas id="ca" style="display:block;width:100%;height:420px"></canvas>
<script>
const canvas=document.getElementById('ca');
const ctx=canvas.getContext('2d');
const DPR=window.devicePixelRatio||1;
const W=680,H=420;
canvas.width=W*DPR;canvas.height=H*DPR;
canvas.style.width=W+'px';canvas.style.height=H+'px';
ctx.scale(DPR,DPR);

const isDark=()=>window.matchMedia('(prefers-color-scheme:dark)').matches;
const INK=()=>isDark()?'255,255,255':'0,0,0';

const DIMS=[
  {label:'A  error count',x:200,y:180,r:52,color:'rgba(0,0,0,1)',digits:['0','1','2','4','8','×4','×2','1','3','0']},
  {label:'B  holistic vote',x:380,y:200,r:44,color:'rgba(0,0,0,1)',digits:['exc','ok','base','good','3','2','1','4']},
  {label:'weight',x:520,y:175,r:34,color:'rgba(0,0,0,1)',digits:['%','10','14','12','w','8','6']},
];

const particles=[];
let t=0;

function spawnParticle(dim){
  const angle=Math.random()*Math.PI*2;
  const dist=dim.r*(0.7+Math.random()*0.5);
  const digit=dim.digits[Math.floor(Math.random()*dim.digits.length)];
  const speed=0.18+Math.random()*0.22;
  const life=180+Math.random()*160;
  particles.push({
    x:dim.x+Math.cos(angle)*dist*0.3,
    y:dim.y+Math.sin(angle)*dist*0.3,
    tx:dim.x+Math.cos(angle)*dist*(1.8+Math.random()*1.2),
    ty:dim.y+Math.sin(angle)*dist*(1.8+Math.random()*1.2),
    digit,speed,life,maxLife:life,
    size:9+Math.random()*11,
    dim,progress:0,
    delay:Math.random()*60
  });
}

function drawBlob(dim,time){
  const ink=INK();
  ctx.save();
  ctx.translate(dim.x,dim.y);
  const pts=8;
  ctx.beginPath();
  for(let i=0;i<=pts;i++){
    const a=(i/pts)*Math.PI*2;
    const wobble=1+0.12*Math.sin(a*3+time*0.02+dim.x)+0.08*Math.cos(a*2-time*0.015);
    const r=dim.r*wobble;
    const x=Math.cos(a)*r,y=Math.sin(a)*r;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle=`rgb(${ink})`;
  ctx.fill();

  ctx.fillStyle=`rgba(${ink===INK()?'0,0,0':'255,255,255'},0)`;
  ctx.font=`500 11px var(--font-mono,monospace)`;
  ctx.textAlign='center';
  ctx.textBaseline='alphabetic';
  ctx.fillStyle=isDark()?'rgba(255,255,255,0.55)':'rgba(255,255,255,0.9)';
  ctx.fillText(dim.label, 0, dim.r+18);
  ctx.restore();
}

function drawParticle(p){
  const prog=Math.min(1,p.progress);
  const alive=(p.maxLife-p.life)/p.maxLife;
  const fadeIn=Math.min(1,alive*6);
  const fadeOut=1-Math.max(0,(alive-0.7)/0.3);
  const alpha=fadeIn*fadeOut*0.85;
  const x=p.x+(p.tx-p.x)*prog;
  const y=p.y+(p.ty-p.y)*prog;
  const ink=INK();
  ctx.save();
  ctx.globalAlpha=alpha;
  ctx.font=`400 ${Math.round(p.size)}px var(--font-mono,monospace)`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillStyle=`rgb(${ink})`;
  ctx.fillText(p.digit,x,y);
  ctx.restore();
}

function drawConnectors(){
  const ink=INK();
  ctx.save();
  ctx.strokeStyle=`rgba(${ink},0.12)`;
  ctx.lineWidth=0.5;
  ctx.setLineDash([2,4]);
  for(let i=0;i<DIMS.length-1;i++){
    ctx.beginPath();
    ctx.moveTo(DIMS[i].x,DIMS[i].y);
    ctx.lineTo(DIMS[i+1].x,DIMS[i+1].y);
    ctx.stroke();
  }
  ctx.restore();
}

function drawScore(){
  const ink=INK();
  const prog=Math.min(1,(t-120)/80);
  if(prog<=0)return;
  ctx.save();
  ctx.globalAlpha=prog;
  ctx.font=`500 11px var(--font-mono,monospace)`;
  ctx.textAlign='center';
  ctx.fillStyle=`rgb(${ink})`;
  const sx=370,sy=330;
  ctx.strokeStyle=`rgba(${ink},0.3)`;
  ctx.lineWidth=0.5;
  ctx.setLineDash([]);
  ctx.strokeRect(sx-36,sy-18,72,26);
  ctx.fillText('score  →  84',sx,sy-1);
  for(let d of DIMS){
    ctx.beginPath();
    ctx.moveTo(d.x,d.y+d.r+2);
    ctx.lineTo(sx,sy-18);
    ctx.strokeStyle=`rgba(${ink},0.07)`;
    ctx.lineWidth=0.5;
    ctx.setLineDash([1,5]);
    ctx.stroke();
  }
  ctx.restore();
}

function frame(){
  ctx.clearRect(0,0,W,H);
  t++;

  drawConnectors();

  for(let d of DIMS){
    if(t%18===0||(t<30&&t%6===0)) spawnParticle(d);
    drawBlob(d,t);
  }

  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    if(p.delay>0){p.delay--;continue;}
    p.life--;
    p.progress+=p.speed*0.014;
    drawParticle(p);
    if(p.life<=0)particles.splice(i,1);
  }

  drawScore();
  requestAnimationFrame(frame);
}
frame();
</script>
